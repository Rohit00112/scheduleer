services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: schedule_hub
      POSTGRES_USER: schedule
      POSTGRES_PASSWORD: schedule
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedule -d schedule_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-dev:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm --filter @schedule/api prisma:generate && pnpm --filter @schedule/api prisma:push && pnpm --filter @schedule/api prisma:seed && pnpm --filter @schedule/api build && node apps/api/dist/main.js"
    env_file:
      - ./.env.dev
    environment:
      DATABASE_URL: postgresql://schedule:schedule@postgres:5432/schedule_hub
      REDIS_URL: redis://redis:6379
      PORT: 4000
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ../../:/workspace
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-dev:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm --filter @schedule/api build && node apps/api/dist/worker.js"
    env_file:
      - ./.env.dev
    environment:
      DATABASE_URL: postgresql://schedule:schedule@postgres:5432/schedule_hub
      REDIS_URL: redis://redis:6379
      PORT: 4000
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ../../:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-dev:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm --filter @schedule/web dev"
    env_file:
      - ./.env.dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000/realtime
    volumes:
      - ../../:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - api-dev

volumes:
  pgdata_dev:
