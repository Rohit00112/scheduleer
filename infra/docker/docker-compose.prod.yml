services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: schedule_hub
      POSTGRES_USER: schedule
      POSTGRES_PASSWORD: schedule
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedule -d schedule_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ./.env.prod
    environment:
      DATABASE_URL: postgresql://schedule:schedule@postgres:5432/schedule_hub
      REDIS_URL: redis://redis:6379
      PORT: 4000
      ALLOWED_ORIGINS: http://localhost
    command: sh -c "pnpm --filter @schedule/api prisma:generate && pnpm --filter @schedule/api prisma:push && pnpm --filter @schedule/api prisma:seed && node apps/api/dist/main.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ./.env.prod
    environment:
      DATABASE_URL: postgresql://schedule:schedule@postgres:5432/schedule_hub
      REDIS_URL: redis://redis:6379
      PORT: 4000
      ALLOWED_ORIGINS: http://localhost
    command: sh -c "pnpm --filter @schedule/api prisma:generate && node apps/api/dist/worker.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    env_file:
      - ./.env.prod
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_WS_URL: http://localhost/realtime
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  pgdata_prod:
  redis_prod:
